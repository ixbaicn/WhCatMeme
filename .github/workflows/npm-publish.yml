name: Manual NPM Publish

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'NPM package name (leave empty to use package.json name)'
        required: false
        default: ''
        type: string
      version:
        description: 'Version to publish (example: 1.0.1)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: yarn

      - name: Install dependencies
        run: yarn install

      - name: Resolve package name
        id: resolve_name
        shell: bash
        run: |
          input_name="${{ github.event.inputs.package_name }}"
          if [ -n "$input_name" ]; then
            pkg_name="$input_name"
          else
            pkg_name="$(node -p "require('./package.json').name")"
          fi
          echo "PACKAGE_NAME=$pkg_name" >> "$GITHUB_ENV"
          echo "Using package name: $pkg_name"

      - name: Validate version format
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $version"
            exit 1
          fi

      - name: Update package metadata
        shell: bash
        run: |
          npm pkg set name="${PACKAGE_NAME}"
          npm pkg set version="${{ github.event.inputs.version }}"
          echo "Publishing ${PACKAGE_NAME}@${{ github.event.inputs.version }}"

      - name: Check package status on npm
        shell: bash
        run: |
          if npm view "${PACKAGE_NAME}" version >/dev/null 2>&1; then
            echo "Package ${PACKAGE_NAME} already exists on npm."
          else
            echo "Package ${PACKAGE_NAME} does not exist yet. npm will create it on first successful publish."
          fi

          if npm view "${PACKAGE_NAME}@${{ github.event.inputs.version }}" version >/dev/null 2>&1; then
            echo "Version already exists: ${PACKAGE_NAME}@${{ github.event.inputs.version }}"
            exit 1
          fi

      - name: Build
        run: yarn build

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
